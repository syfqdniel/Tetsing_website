<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Advanced 3D Interactive Site</title>

<style>
  body {
    margin: 0;
    overflow-x: hidden;
    background: black;
    height: 200vh; /* enable scroll */
  }

  canvas {
    display: block;
    position: fixed;
    top: 0;
  }

  .section {
    position: relative;
    color: white;
    font-size: 40px;
    padding: 100px;
    z-index: 1;
  }
</style>
</head>

<body>

<div class="section">Scroll Down ↓</div>
<div class="section">Interactive 3D Experience</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
let scene = new THREE.Scene();
let camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.z = 5;

let renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5,5,5);
scene.add(light);

// =======================
// 🌌 PARTICLES
// =======================
const particlesGeometry = new THREE.BufferGeometry();
const particlesCount = 2000;

const posArray = new Float32Array(particlesCount * 3);
for(let i = 0; i < particlesCount * 3; i++){
  posArray[i] = (Math.random() - 0.5) * 10;
}

particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));

const particlesMaterial = new THREE.PointsMaterial({ size: 0.02 });
const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
scene.add(particlesMesh);

// =======================
// 📦 LOAD GLB MODEL
// =======================
let model;
const loader = new THREE.GLTFLoader();

loader.load('Untitled1.glb', function(gltf){
  model = gltf.scene;
  scene.add(model);
}, undefined, function(error){
  console.error(error);
});

// =======================
// 🎮 SCROLL ANIMATION
// =======================
window.addEventListener('scroll', () => {
  const scrollY = window.scrollY;

  if(model){
    model.rotation.y = scrollY * 0.002;
    model.position.y = -scrollY * 0.002;
  }
});

// =======================
// 💡 HOVER INTERACTION
// =======================
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

window.addEventListener('mousemove', (event) => {
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
});

// CLICK EVENT
window.addEventListener('click', () => {
  if(model){
    alert("Model clicked! 🔥");
  }
});

// =======================
// 🔁 ANIMATE
// =======================
function animate(){
  requestAnimationFrame(animate);

  if(model){
    model.rotation.x += 0.003;
  }

  particlesMesh.rotation.y += 0.0005;

  renderer.render(scene, camera);
}

animate();

// RESPONSIVE
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
